name: Frontend Docker Deploy

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create frontend .env
        shell: bash
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          set -euo pipefail
          cp ./frontend/.env.example ./frontend/.env
          if grep -q '^VITE_BACKEND_URL=' ./frontend/.env; then
            sed -i "s|^VITE_BACKEND_URL=.*|VITE_BACKEND_URL=${BACKEND_URL}|" ./frontend/.env
          else
            printf '\nVITE_BACKEND_URL=%s\n' "${BACKEND_URL}" >> ./frontend/.env
          fi

      - name: Build frontend image
        run: |
          docker build -t faceguard-frontend:latest ./frontend

      - name: Stop existing container (if any)
        run: |
          docker rm -f faceguard-frontend || true

      - name: Run frontend container
        run: |
          docker run -d --name faceguard-frontend --restart unless-stopped -p 8080:8080 faceguard-frontend:latest
