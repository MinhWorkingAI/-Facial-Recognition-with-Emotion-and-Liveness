name: Retrain Models

on:
  workflow_dispatch:

jobs:
  retrain:
    runs-on: self-hosted
    timeout-minutes: 2000
    env:
      SPOOF_CONDA_ENV: "tensorflow_spoof"
      EMOTION_CONDA_ENV: "emotion_detection"
      RECOGNITION_CONDA_ENV: "recognition"
      SPOOF_DATASET_DEST: "training_module/anti_spoofing_module_MobileNetV2"
      EMOTION_DATASET_DEST: "training_module/emotion_module/affectnet/AffectNet"
      RECOGNITION_DATASET_DEST: "training_module/face_recognition_module/dataset/11-785-fall-20-homework-2-part-2/classification_data_aligned"
      WEIGHTS_DIR: "backend/weights"
    steps:
      - name: Clean up runner_captures
        shell: bash
        run: |
          if [ -d "$GITHUB_WORKSPACE/runner_captures" ]; then
            docker run --rm \
              -v "$GITHUB_WORKSPACE/runner_captures:/target" \
              alpine \
              sh -c "rm -rf /target/*"
            rmdir "$GITHUB_WORKSPACE/runner_captures" || true
          fi
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy datasets into workspace
        shell: bash
        run: |
          set -euo pipefail
          SPOOF_DATASET_SRC="$HOME/Desktop/Datasets/LCC_FASD"
          EMOTION_DATASET_SRC="$HOME/Desktop/Datasets/emotion/AffectNet"
          RECOGNITION_DATASET_SRC="$HOME/Desktop/Datasets/recognition/classification_data_aligned"
          PRETRAINED_BACKBONE_SRC="$HOME/Desktop/Datasets/recognition/resnet18_110.pth"
          

          if [ ! -d "$SPOOF_DATASET_SRC" ]; then
            echo "Missing spoof dataset: $SPOOF_DATASET_SRC" >&2
            exit 1
          fi
          if [ ! -d "$EMOTION_DATASET_SRC" ]; then
            echo "Missing emotion dataset: $EMOTION_DATASET_SRC" >&2
            exit 1
          fi
          if [ ! -d "$RECOGNITION_DATASET_SRC" ]; then
            echo "Missing recognition dataset: $RECOGNITION_DATASET_SRC" >&2
            exit 1
          fi
          if [ ! -f "$PRETRAINED_BACKBONE_SRC" ]; then
            echo "Missing pretrained backbone: $PRETRAINED_BACKBONE_SRC" >&2
            exit 1
          fi
          mkdir -p "$SPOOF_DATASET_DEST" "$EMOTION_DATASET_DEST" "$RECOGNITION_DATASET_DEST"
          cp -a "$SPOOF_DATASET_SRC" "$SPOOF_DATASET_DEST/"
          cp -a "$EMOTION_DATASET_SRC"/* "$EMOTION_DATASET_DEST/"
          cp -a "$RECOGNITION_DATASET_SRC"/* "$RECOGNITION_DATASET_DEST/"
          cp -f "$PRETRAINED_BACKBONE_SRC" training_module/face_recognition_module/resnet18_110.pth
      
      - name: Extract captures volume
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p runner_captures

          docker run --rm \
            -v captures_data:/from \
            -v "$PWD/runner_captures:/to" \
            alpine \
            sh -c "cp -r /from/* /to/ || true"


      - name: Merge captured faces into datasets
        shell: bash
        run: |
          set -euo pipefail
          export PYTHONPATH=$PWD
          python -m backend.captures.merge_captures
        env:
          CAPTURES_DIR: runner_captures

          TRAIN_FASD_PATH: training_module/anti_spoofing_module_MobileNetV2/LCC_FASD/LCC_FASD_training
          TEST_FASD_PATH: training_module/anti_spoofing_module_MobileNetV2/LCC_FASD/LCC_FASD_evaluation

          TRAIN_AFFECTNET_PATH: training_module/emotion_module/affectnet/AffectNet/Train
          TEST_AFFECTNET_PATH: training_module/emotion_module/affectnet/AffectNet/Test

          RECOGNITION_PATH: training_module/face_recognition_module/dataset/11-785-fall-20-homework-2-part-2/classification_data_aligned

      - name: Persist newly merged dataset back to Datasets
        shell: bash
        run: |
          set -euo pipefail

          SPOOF_DATASET_SRC="$HOME/Desktop/Datasets/LCC_FASD"
          EMOTION_DATASET_SRC="$HOME/Desktop/Datasets/emotion/AffectNet"
          RECOGNITION_DATASET_SRC="$HOME/Desktop/Datasets/recognition/classification_data_aligned"
          rsync -a \
            training_module/anti_spoofing_module_MobileNetV2/LCC_FASD/ \
            "$SPOOF_DATASET_SRC/"

          rsync -a \
            training_module/emotion_module/affectnet/AffectNet/ \
            "$EMOTION_DATASET_SRC/"

          rsync -a \
            training_module/face_recognition_module/dataset/11-785-fall-20-homework-2-part-2/classification_data_aligned/ \
            "$RECOGNITION_DATASET_SRC/"


      - name: Clear processed captures
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v captures_data:/data \
            alpine \
            sh -c "rm -rf /data/*"

      - name: Train anti-spoofing model
        shell: bash
        working-directory: training_module/anti_spoofing_module_MobileNetV2
        run: |
          set -euo pipefail
          source "$(conda info --base)/etc/profile.d/conda.sh"
          conda activate "$SPOOF_CONDA_ENV"
          python anti_spoofing.py

      - name: Publish anti-spoofing weights
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$WEIGHTS_DIR"
          cp -f training_module/anti_spoofing_module_MobileNetV2/model/anti_spoofing.onnx "$WEIGHTS_DIR/anti_spoofing.onnx"

      - name: Upload anti-spoofing reports
        uses: actions/upload-artifact@v4
        with:
          name: anti-spoofing-metrics
          retention-days: 7
          path: |
            training_module/anti_spoofing_module_MobileNetV2/model/classification_report.txt
            training_module/anti_spoofing_module_MobileNetV2/model/confusion_matrix.png
            training_module/anti_spoofing_module_MobileNetV2/model/metrics.json
            training_module/anti_spoofing_module_MobileNetV2/model/dataset_summary.csv
            training_module/anti_spoofing_module_MobileNetV2/model/training_graph.png
          if-no-files-found: error

      - name: Train emotion model
        shell: bash
        working-directory: training_module/emotion_module/affectnet
        run: |
          set -eo pipefail
          export NVCC_PREPEND_FLAGS="${NVCC_PREPEND_FLAGS-}"
          source "$(conda info --base)/etc/profile.d/conda.sh"
          conda activate "$EMOTION_CONDA_ENV"
          set -u
          PYTORCH_CUDA_ALLOC_CONF="expandable_segments:True" python train.py
          python export_onnx.py

      - name: Publish emotion weights
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$WEIGHTS_DIR"
          cp -f training_module/emotion_module/affectnet/emotion.onnx "$WEIGHTS_DIR/emotion.onnx"

      - name: Upload emotion metrics
        uses: actions/upload-artifact@v4
        with:
          name: emotion-metrics
          retention-days: 7
          path: training_module/emotion_module/affectnet/metrics/**
          if-no-files-found: error

      - name: Train recognition model
        shell: bash
        working-directory: training_module/face_recognition_module
        run: |
          set -euo pipefail
          source "$(conda info --base)/etc/profile.d/conda.sh"
          conda activate "$RECOGNITION_CONDA_ENV"
          python train_resnet18.py --pretrained-backbone resnet18_110.pth --output-dir checkpoints_resnet18/train_3 --freeze-backbone 3 --optimizer adamw --scheduler cosine --lr 0.005 --epochs 50 --batch-size 64 --dropout 0.5 --loss focal --head arcface --resize-size 0 --amp > train.log
          python export_onnx.py --device cuda

      - name: Publish recognition weights
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$WEIGHTS_DIR"
          cp -f training_module/face_recognition_module/checkpoints_resnet18/train_3/resnet18_face.onnx "$WEIGHTS_DIR/resnet18_face.onnx"

      - name: Upload recognition metrics
        uses: actions/upload-artifact@v4
        with:
          name: recognition-metrics
          retention-days: 7
          path: |
            training_module/face_recognition_module/checkpoints_resnet18/train_3/metrics.csv
            training_module/face_recognition_module/checkpoints_resnet18/train_3/test_confusion_matrix_nonzero.csv
            training_module/face_recognition_module/checkpoints_resnet18/train_3/test_roc_curve.csv
            training_module/face_recognition_module/checkpoints_resnet18/train_3/test_roc_curve.png
            training_module/face_recognition_module/checkpoints_resnet18/train_3/test_verification_pairs.csv
            training_module/face_recognition_module/checkpoints_resnet18/train_3/training_curves.png
            training_module/face_recognition_module/checkpoints_resnet18/train_3/training_history.json
            training_module/face_recognition_module/checkpoints_resnet18/train_3/training_metadata.json
            training_module/face_recognition_module/checkpoints_resnet18/train_3/validation_metrics.png
          if-no-files-found: error
      
      - name: Clean up previous docker containers
        shell: bash
        run: |
          set -euo pipefail
          docker compose down --remove-orphans
          
      - name: Build and run Docker container
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build -d
          echo "Waiting for services to start..."
          sleep 15

      - name: Run API tests
        shell: bash
        run: |
          set -euo pipefail
          source "$(conda info --base)/etc/profile.d/conda.sh"
          conda activate mlops
          pytest -v