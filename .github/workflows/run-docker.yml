name: Run docker without retraining

on:
  workflow_dispatch:

jobs:
  retrain:
    runs-on: self-hosted
    env:
      SPOOF_CONDA_ENV: "tensorflow_spoof"
      EMOTION_CONDA_ENV: "emotion_detection"
      RECOGNITION_CONDA_ENV: "recognition"
      SPOOF_DATASET_DEST: "training_module/anti_spoofing_module_MobileNetV2"
      EMOTION_DATASET_DEST: "training_module/emotion_module/affectnet/AffectNet"
      RECOGNITION_DATASET_DEST: "training_module/face_recognition_module/dataset/11-785-fall-20-homework-2-part-2/classification_data_aligned"
      WEIGHTS_DIR: "backend/weights"
    steps:
      - name: Clean up runner_captures
        shell: bash
        run: |
          if [ -d "$GITHUB_WORKSPACE/runner_captures" ]; then
            docker run --rm \
              -v "$GITHUB_WORKSPACE/runner_captures:/target" \
              alpine \
              sh -c "rm -rf /target/*"
            rmdir "$GITHUB_WORKSPACE/runner_captures" || true
          fi
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy datasets into workspace
        shell: bash
        run: |
          set -euo pipefail
          SPOOF_DATASET_SRC="$HOME/Desktop/Dataset2/LCC_FASD"
          EMOTION_DATASET_SRC="$HOME/Desktop/Dataset2/emotion/AffectNet"
          RECOGNITION_DATASET_SRC="$HOME/Desktop/Dataset2/recognition/classification_data_aligned"
          PRETRAINED_BACKBONE_SRC="$HOME/Desktop/Dataset2/recognition/resnet18_110.pth"
          

          if [ ! -d "$SPOOF_DATASET_SRC" ]; then
            echo "Missing spoof dataset: $SPOOF_DATASET_SRC" >&2
            exit 1
          fi
          if [ ! -d "$EMOTION_DATASET_SRC" ]; then
            echo "Missing emotion dataset: $EMOTION_DATASET_SRC" >&2
            exit 1
          fi
          if [ ! -d "$RECOGNITION_DATASET_SRC" ]; then
            echo "Missing recognition dataset: $RECOGNITION_DATASET_SRC" >&2
            exit 1
          fi
          if [ ! -f "$PRETRAINED_BACKBONE_SRC" ]; then
            echo "Missing pretrained backbone: $PRETRAINED_BACKBONE_SRC" >&2
            exit 1
          fi
          mkdir -p "$SPOOF_DATASET_DEST" "$EMOTION_DATASET_DEST" "$RECOGNITION_DATASET_DEST"
          cp -a "$SPOOF_DATASET_SRC" "$SPOOF_DATASET_DEST/"
          cp -a "$EMOTION_DATASET_SRC"/* "$EMOTION_DATASET_DEST/"
          cp -a "$RECOGNITION_DATASET_SRC"/* "$RECOGNITION_DATASET_DEST/"
          cp -f "$PRETRAINED_BACKBONE_SRC" training_module/face_recognition_module/resnet18_110.pth
      
      - name: Extract captures volume
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p runner_captures
          docker run --rm \
            -v captures_data:/from \
            -v "$PWD/runner_captures:/to" \
            alpine \
            sh -c "cp -r /from/* /to/ || true"


      - name: Merge captured faces into datasets
        shell: bash
        run: |
          set -euo pipefail
          export PYTHONPATH=$PWD
          python -m backend.captures.merge_captures
        env:
          CAPTURES_DIR: runner_captures

          TRAIN_FASD_PATH: training_module/anti_spoofing_module_MobileNetV2/LCC_FASD/LCC_FASD_training
          TEST_FASD_PATH: training_module/anti_spoofing_module_MobileNetV2/LCC_FASD/LCC_FASD_evaluation

          TRAIN_AFFECTNET_PATH: training_module/emotion_module/affectnet/AffectNet/Train
          TEST_AFFECTNET_PATH: training_module/emotion_module/affectnet/AffectNet/Test

          RECOGNITION_PATH: training_module/face_recognition_module/dataset/11-785-fall-20-homework-2-part-2/classification_data_aligned

      - name: Persist newly merged dataset back to Dataset2
        shell: bash
        run: |
          set -euo pipefail

          SPOOF_DATASET_SRC="$HOME/Desktop/Dataset2/LCC_FASD"
          EMOTION_DATASET_SRC="$HOME/Desktop/Dataset2/emotion/AffectNet"
          RECOGNITION_DATASET_SRC="$HOME/Desktop/Dataset2/recognition/classification_data_aligned"
          rsync -a \
            training_module/anti_spoofing_module_MobileNetV2/LCC_FASD/ \
            "$SPOOF_DATASET_SRC/"

          rsync -a \
            training_module/emotion_module/affectnet/AffectNet/ \
            "$EMOTION_DATASET_SRC/"

          rsync -a \
            training_module/face_recognition_module/dataset/11-785-fall-20-homework-2-part-2/classification_data_aligned/ \
            "$RECOGNITION_DATASET_SRC/"


      - name: Clear processed captures
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v captures_data:/data \
            alpine \
            sh -c "rm -rf /data/*"  # changed from /data/screenshots/*

      
      - name: Clean up previous docker containers
        shell: bash
        run: |
          set -euo pipefail
          docker compose down --remove-orphans
          
      - name: Build and run Docker container
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build -d


      - name: Run API tests
        shell: bash
        run: |
          set -euo pipefail
          source "$(conda info --base)/etc/profile.d/conda.sh"
          conda activate mlops
          pytest -v