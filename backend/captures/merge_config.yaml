# Paths are relative to repo root unless absolute.
# Enable targets under `targets` and set each `root`.

repo_root: ""
captures_dir: backend/captures/screenshots
manifest_path: ""

min_confidence: 0.7
min_detection_confidence: 0.7

targets:
  # LCC_FASD: <root>/LCC_FASD_training|development|evaluation/real|spoof/
  # JSON: faces[].anti_spoofing (label_from: liveness)
  anti_spoofing:
    enabled: true
    root: LCC_FASD
    split: training
    label_from: liveness
    min_confidence: 0.7

  # AffectNet: <root>/Train|Test/<emotion>/
  # JSON: faces[].emotion (label_from: emotion)
  emotion_affectnet:
    enabled: true
    root: AffectNet
    split: train
    label_from: emotion
    min_confidence: 0.5

  # ArcFace training: <root>/train_data|val_data|test_data/<person_id>/
  # JSON: faces[].recognition (label_from: recognition)
  face_recognition:
    enabled: false
    root: ""
    split: train
    label_from: recognition
    only_matched: true
    require_live: true
    min_confidence: 0.7
